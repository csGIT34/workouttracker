apiVersion: v1
kind: Secret
metadata:
  name: workout-tracker-secrets
  namespace: workout-tracker
type: Opaque
stringData:
  DATABASE_URL: "postgresql://postgres:postgres@postgres-service:5432/workouttracker"
  JWT_SECRET: "your-production-jwt-secret-change-this"
  JWT_REFRESH_SECRET: "your-production-refresh-secret-change-this"
  POSTGRES_PASSWORD: "postgres"
